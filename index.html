// ── HELPERS ───────────────────────────────────────────────────────────
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmtDate(ts){return new Date(ts).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function fmtInc(dt){if(!dt)return"—";try{return new Date(dt).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});}catch(e){return dt;}}
function timeAgo(ts){var d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return"Just now";if(m<60)return m+"m ago";var h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago";}
function nowLocal(){return new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);}

// Find Lv1 entry from a typed/selected value
function findLv1(val){
  if(!val)return null;
  var v=val.trim();
  return AREAS_DATA.find(function(a){
    return v===a.code||v===a.code+" - "+a.name||v.startsWith(a.code+" ")||v.startsWith(a.code+"-");
  })||null;
}

function exportCSV(data){
  var h=["Ref","Badge","Name","Discipline","Lv1 Area","Lv2 Area","Activity ID","Disruption Type","Severity","Incident Date","Description","Resources Involved","Impact","Action","Status","Submitted"];
  var rows=data.map(function(d){
    return[d.id,d.badge,'"'+d.name+'"','"'+d.discipline+'"','"'+(d.areaLv1||"")+'"','"'+(d.areaLv2||"")+'"',d.activityId||"",'"'+d.type+'"',d.severity,'"'+fmtInc(d.incidentDate)+'"','"'+(d.description||"").replace(/"/g,'""')+'"','"'+(d.resources||"").replace(/"/g,'""')+'"','"'+(d.impact||"").replace(/"/g,'""')+'"','"'+(d.action||"").replace(/"/g,'""')+'"',d.status,fmtDate(d.timestamp)];
  });
  var csv=[h,...rows].map(function(r){return r.join(",");}).join("\n");
  var blob=new Blob([csv],{type:"text/csv"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="NFS_Disruptions_"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(url);
}

// Combobox: input + datalist (allows manual entry AND selection from list)
function Combo(p){
  var id="cb-"+p.id;
  return React.createElement("div",null,
    React.createElement("input",{
      list:id,value:p.value,
      onChange:function(e){p.onChange(e.target.value);},
      placeholder:p.placeholder,
      className:"field-inp"+(p.err?" err":""),
      disabled:p.disabled||false
    }),
    React.createElement("datalist",{id:id},
      (p.options||[]).map(function(o,i){return React.createElement("option",{key:i,value:o});})
    )
  );
}

function EditableList(p){
  var [nv,setNv]=useState("");
  function add(){var v=nv.trim();if(!v||p.items.indexOf(v)>=0)return;p.onChange([...p.items,v]);setNv("");}
  function remove(i){p.onChange(p.items.filter(function(_,j){return j!==i;}));}
  return React.createElement("div",null,
    p.items.map(function(item,i){
      return React.createElement("div",{key:i,className:"list-item"},
        React.createElement("span",{style:{wordBreak:"break-all",fontSize:13}},item),
        React.createElement("button",{onClick:function(){remove(i);}},"\u00d7")
      );
    }),
    React.createElement("div",{className:"add-row"},
      React.createElement("input",{value:nv,onChange:function(e){setNv(e.target.value);},onKeyDown:function(e){if(e.key==="Enter")add();},placeholder:"Add "+p.placeholder+"..."}),
      React.createElement("button",{onClick:add},"\u002b Add")
    )
  );
}

  var [form,setForm]=useState(blankForm());
  var [err,setErr]=useState({});
  var [busy,setBusy]=useState(false);

  // Online
  useEffect(function(){
    function on(){setOnline(true);}function off(){setOnline(false);}
    window.addEventListener("online",on);window.addEventListener("offline",off);
    return function(){window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);

  // Auth
  useEffect(function(){
    if(!auth||!db)return;
    var unsub=auth.onAuthStateChanged(function(user){
      if(user){
        setCurrentUser(user);setAuthState("checking");
        db.collection("settings").doc("admins").get().then(function(snap){
          var emails=snap.exists?(snap.data().emails||[]):[BOOTSTRAP_ADMIN];
          if(!snap.exists)db.collection("settings").doc("admins").set({emails:[BOOTSTRAP_ADMIN]});
          setAdmins(emails.includes(BOOTSTRAP_ADMIN)?emails:[BOOTSTRAP_ADMIN,...emails]);
          var ok=emails.includes(user.email)||user.email===BOOTSTRAP_ADMIN;
          setAuthState(ok?"admin":"denied");
          if(ok)setView("admin");
        }).catch(function(){setAuthState(user.email===BOOTSTRAP_ADMIN?"admin":"denied");});
      }else{setCurrentUser(null);setAuthState("out");}
    });
    return function(){unsub();};
  },[]);

  // Real-time data
  useEffect(function(){
    if(!db)return;
    var unsub=db.collection("disruptions").orderBy("timestamp","desc").onSnapshot(function(snap){
      setDis(snap.docs.map(function(d){return{id:d.id,...d.data()};}));
      setLoading(false);
    },function(){setLoading(false);});
    return function(){unsub();};
  },[]);

  // Settings listeners
  useEffect(function(){
    if(!db)return;
    function watch(docId,setter,def){
      return db.collection("settings").doc(docId).onSnapshot(function(snap){
        if(snap.exists&&snap.data().items)setter(snap.data().items);
        else{db.collection("settings").doc(docId).set({items:def});setter(def);}
      });
    }
    var u1=watch("disciplines",setDisc,DEFAULT_DISCIPLINES);
    var u2=watch("types",setTypes,DEFAULT_TYPES);
    var u3=db.collection("settings").doc("admins").onSnapshot(function(snap){
